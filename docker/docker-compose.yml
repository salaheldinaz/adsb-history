# Turnstone ADS-B History - full stack
# See docker/README.md for full instructions.
# All persistent data lives under the repo's data/ folder; on restart everything loads from there.

services:
  postgres:
    image: postgis/postgis:16-3.4
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adsb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adsb}
      POSTGRES_DB: ${POSTGRES_DB:-adsb}
    volumes:
      - ../data/pgdata:/var/lib/postgresql/data
      - ./postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./postgres/02_load_modes.sh:/docker-entrypoint-initdb.d/02_load_modes.sh:ro
      - ../data/modes.csv:/docker-entrypoint-initdb.d/modes.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adsb} -d ${POSTGRES_DB:-adsb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-adsb}
      DB_USER: ${DB_USER:-adsb}
      DB_PASS: ${DB_PASS:-adsb}
      DB_PORT: ${DB_PORT:-5432}
      DISABLE_AUTH: ${DISABLE_AUTH:-1}
      QUERY_HISTORY_BACKUP_PATH: ${QUERY_HISTORY_BACKUP_PATH:-/data/query-history-backup.json}
      FIREBASE_SERVICE_ACCOUNT_KEY: ${FIREBASE_SERVICE_ACCOUNT_KEY:-/app/firebase-key.json}
    volumes:
      - ../data:/data
      - ../data/firebase-key.json:/app/firebase-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-5000}:5000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
        VITE_DISABLE_AUTH: ${VITE_DISABLE_AUTH:-1}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  data-loading:
    build:
      context: ..
      dockerfile: docker/Dockerfile.data-loading
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://adsb:adsb@postgres:5432/adsb}
    volumes:
      - ../data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["python", "process_adsb_data.py"]
    command: ["/data"]
